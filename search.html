<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>搜索商品 - 校园闲置铺</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="search">
  <div class="page"><div class="shell">
    <header class="topbar"><a class="logo" href="index.html">校园闲置铺</a><nav class="nav-actions"><a class="btn primary" href="publish.html">发布商品</a><a class="btn secondary" href="profile.html" data-user-center>用户个人中心</a></nav></header>
    <main class="section">
      <h1><span class="chip">搜索商品</span></h1>
      <form class="form" id="searchForm">
        <label>关键词<input id="keyword" placeholder="输入商品名称或分类"></label>
        <label>分类<select id="category"><option value="">全部分类</option><option value="1">教材资料</option><option value="2">数码电子</option><option value="3">生活用品</option><option value="4">服饰鞋包</option><option value="5">运动户外</option><option value="6">宿舍家具</option><option value="7">文具工具</option><option value="8">其他闲置</option></select></label>
        <label>排序<select id="sort"><option value="time-desc">发布时间：最新优先</option><option value="time-asc">发布时间：最早优先</option><option value="price-asc">价格：从低到高</option><option value="price-desc">价格：从高到低</option></select></label>
        <button class="btn primary" type="submit">搜索</button>
      </form>
      <section class="section grid" data-products></section>
    </main>
  </div></div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
