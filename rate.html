<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>用户评分 - 校园闲置铺</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="page"><div class="shell">
    <header class="topbar"><a class="logo" href="index.html">校园闲置铺</a><nav class="nav-actions"><a class="btn" href="orders.html">我的订单</a></nav></header>
    <main class="section two-col">
      <section class="card violet"><h1>评分</h1><p class="lead">订单完成后，买卖双方可以互相评分。</p></section>
      <form class="form" action="orders.html">
        <label>星级评分<select><option>★★★★★ 5分</option><option>★★★★ 4分</option><option>★★★ 3分</option><option>★★ 2分</option><option>★ 1分</option></select></label>
        <label>评价内容<textarea placeholder="写下本次交易体验"></textarea></label>
        <button class="btn primary full">提交评分</button>
      </form>
    </main>
  </div></div>
</body>
</html>
