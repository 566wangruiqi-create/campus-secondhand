<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>提交争议 - 校园闲置铺</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="dispute">
  <div class="page"><div class="shell">
    <header class="topbar"><a class="logo" href="index.html">校园闲置铺</a><nav class="nav-actions"><a class="btn" href="profile.html">个人中心</a></nav></header>
    <main class="section two-col">
      <section class="card red"><h1>提交争议</h1><p class="lead">交易异常时提交说明，管理员会在后台处理。</p></section>
      <form class="form" id="disputeForm">
        <label>订单编号<input name="order_id" required readonly></label>
        <label>问题说明<textarea name="reason" required placeholder="请说明发生了什么"></textarea></label>
        <label>证据链接<input name="evidence" placeholder="可填写图片或文件链接"></label>
        <button class="btn primary full" type="submit">提交给管理员</button>
      </form>
    </main>
  </div></div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
