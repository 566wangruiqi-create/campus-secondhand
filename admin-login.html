<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理员登录 - 校园闲置铺</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="page"><div class="shell">
    <header class="topbar"><a class="logo" href="index.html">校园闲置铺</a><nav class="nav-actions"><a class="btn" href="index.html">用户端首页</a></nav></header>
    <main class="section two-col">
      <section class="card black"><h1>管理员登录</h1><p class="lead">默认管理员账号：admin@example.com，密码：admin123。</p></section>
      <form class="form" id="adminLoginForm">
        <label>管理员账号<input name="username" required type="email" placeholder="admin@example.com"></label>
        <label>管理员密码<input name="password" required type="password" placeholder="admin123"></label>
        <button class="btn primary full" type="submit">进入后台</button>
      </form>
    </main>
  </div></div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
