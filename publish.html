<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>发布商品 - 校园闲置铺</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="page"><div class="shell">
    <header class="topbar"><a class="logo" href="index.html">校园闲置铺</a><nav class="nav-actions"><a class="btn" href="orders.html">我的订单</a><a class="btn secondary" href="profile.html">用户个人中心</a></nav></header>
    <main class="section two-col">
      <section class="card red"><h1>发布商品</h1><p class="lead">填写清楚商品信息，发布后进入在售状态。</p></section>
      <form class="form" action="profile.html">
        <label>商品名称<input required placeholder="例如：高等数学教材"></label>
        <label>商品分类<select required><option>教材资料</option><option>数码电子</option><option>生活用品</option><option>服饰鞋包</option><option>运动户外</option><option>宿舍家具</option><option>文具工具</option><option>其他闲置</option></select></label>
        <label>价格<input required type="number" min="1" placeholder="例如：28"></label>
        <label>新旧程度<input required placeholder="例如：八成新"></label>
        <label>商品地址<input required placeholder="例如：东校区图书馆自取柜 A-12"></label>
        <label>联系方式<input required placeholder="订单完成后才向对方展示"></label>
        <label>商品描述<textarea required placeholder="描述商品状态、配件、注意事项"></textarea></label>
        <button class="btn primary full" type="submit">提交发布</button>
      </form>
    </main>
  </div></div>
</body>
</html>
