<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>发布商品 - 校园闲置铺</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="publish">
  <div class="page"><div class="shell">
    <header class="topbar"><a class="logo" href="index.html">校园闲置铺</a><nav class="nav-actions"><a class="btn" href="index.html">返回首页</a></nav></header>
    <main class="section two-col">
      <section class="card red"><h1>发布商品</h1><p class="lead">发布后进入待审核状态，管理员审核通过后才会在商品列表中展示。</p></section>
      <form class="form" id="publishForm">
        <label>商品名称<input name="goods_name" required placeholder="例如：高等数学教材"></label>
        <label>商品分类<select name="category" required><option value="1">教材资料</option><option value="2">数码电子</option><option value="3">生活用品</option><option value="4">服饰鞋包</option><option value="5">运动户外</option><option value="6">宿舍家具</option><option value="7">文具工具</option><option value="8">其他闲置</option></select></label>
        <label>售价<input name="price" required type="number" min="1" step="0.01" placeholder="例如：28"></label>
        <label>原价<input name="original_price" type="number" min="0" step="0.01" placeholder="可不填"></label>
        <label>新旧程度<input name="degree" required placeholder="例如：八成新"></label>
        <label>预计放置地点<input name="location" required placeholder="例如：东校区图书馆自取柜 A-12"></label>
        <label>商品描述<textarea name="description" required placeholder="描述商品状态、配件和注意事项"></textarea></label>
        <button class="btn primary full" type="submit">提交发布</button>
      </form>
    </main>
  </div></div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
