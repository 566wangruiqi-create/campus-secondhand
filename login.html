<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - 校园闲置铺</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="page"><div class="shell">
    <header class="topbar"><a class="logo" href="index.html">校园闲置铺</a><nav class="nav-actions"><a class="btn" href="index.html">返回首页</a></nav></header>
    <main class="section two-col">
      <section class="card yellow"><h1>登录</h1><p class="lead">登录后可以发布商品、下单、查看订单和评分。</p></section>
      <form class="form" action="profile.html">
        <label>账号<input required placeholder="手机号 / 邮箱 / 校园账号"></label>
        <label>密码<input required type="password" placeholder="请输入密码"></label>
        <button class="btn primary full" type="submit">登录</button>
        <a class="btn full" href="profile.html">演示登录</a>
      </form>
    </main>
  </div></div>
</body>
</html>
