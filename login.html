<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>用户登录 - 校园闲置铺</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="page"><div class="shell">
    <header class="topbar"><a class="logo" href="index.html">校园闲置铺</a><nav class="nav-actions"><a class="btn" href="index.html">返回首页</a></nav></header>
    <main class="section two-col">
      <section class="card yellow">
        <p class="eyebrow">WELCOME BACK</p>
        <h1>加入校园闲置铺</h1>
        <p class="lead">注册后即可发布、收藏、下单和评价。测试账号：user1 / 123456。</p>
      </section>
      <section>
        <div class="auth-tabs">
          <button class="btn active" type="button" data-auth-tab="login">登录</button>
          <button class="btn" type="button" data-auth-tab="register">注册新账号</button>
        </div>
        <form class="form" id="loginForm">
          <label>账号<input name="email" required autocomplete="username" placeholder="例如：user1"></label>
          <label>密码<input name="password" required type="password" autocomplete="current-password" placeholder="至少 6 位"></label>
          <button class="btn primary full" type="submit">登录</button>
        </form>
        <form class="form" id="registerForm" hidden>
          <label>登录账号<input name="username" required minlength="3" maxlength="24" pattern="[a-zA-Z0-9_-]+" placeholder="字母、数字、下划线"></label>
          <label>密码<input name="password" required type="password" minlength="6" autocomplete="new-password"></label>
          <label>昵称<input name="name" required placeholder="例如：李同学"></label>
          <label>手机号<input name="phone" inputmode="tel" placeholder="仅在订单双方之间显示"></label>
          <label>微信号<input name="wechat" placeholder="仅在订单双方之间显示"></label>
          <label>邮箱<input name="email" type="email" placeholder="可选"></label>
          <button class="btn primary full" type="submit">注册并进入</button>
        </form>
      </section>
    </main>
  </div></div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
